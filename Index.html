<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B3D2E">
  <title>ร้านสบายพุง</title>
  <style>
    :root{--green:#0B3D2E;--green2:#135A41;--green3:#E8F1EC;--cream:#F8F5EC;--ink:#17352A;--muted:#6B7F76;--danger:#B42318;--white:#fff;--line:#DCE7E0;--shadow:0 10px 28px rgba(11,61,46,.12)}
    *{box-sizing:border-box} body{margin:0;font-family:Tahoma,"Noto Sans Thai",sans-serif;background:var(--cream);color:var(--ink);padding-bottom:110px}
    button,input,textarea{font:inherit} button{cursor:pointer}
    .hero{background:linear-gradient(135deg,var(--green),#06291F);color:#fff;padding:22px 18px 28px;border-radius:0 0 28px 28px;box-shadow:var(--shadow);position:sticky;top:0;z-index:20}
    .hero-top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-size:25px;font-weight:800}.table-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);padding:9px 12px;border-radius:999px;font-weight:700;white-space:nowrap}
    .sub{margin-top:6px;color:#DDEBE4;font-size:14px}.call-btn{margin-top:15px;width:100%;border:1px solid rgba(255,255,255,.4);background:#fff;color:var(--green);font-weight:800;border-radius:14px;padding:12px}
    .shell{max-width:760px;margin:auto;padding:18px}.status-card,.empty,.locked{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
    .notice{background:#FFF8D8;border:1px solid #EBD98A;color:#664D03;border-radius:14px;padding:12px 14px;margin-bottom:16px;font-size:14px;line-height:1.55}
    .category-bar{display:flex;gap:8px;overflow:auto;padding:2px 0 12px;scrollbar-width:none}.category-bar::-webkit-scrollbar{display:none}.chip{border:1px solid var(--line);background:#fff;color:var(--green);border-radius:999px;padding:9px 14px;white-space:nowrap;font-weight:700}.chip.active{background:var(--green);color:#fff;border-color:var(--green)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.menu-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 5px 18px rgba(11,61,46,.08);display:flex;flex-direction:column}.menu-image{width:100%;aspect-ratio:1.35/1;object-fit:cover;background:var(--green3)}.image-placeholder{width:100%;aspect-ratio:1.35/1;background:linear-gradient(135deg,#DDEBE4,#F2F7F4);display:grid;place-items:center;font-size:42px}.menu-body{padding:13px;display:flex;flex-direction:column;flex:1}.menu-name{font-weight:800;font-size:16px;line-height:1.35}.menu-price{font-size:18px;color:var(--green2);font-weight:900;margin-top:6px}.extras{margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}.extra-label{display:flex;gap:7px;align-items:flex-start;margin:7px 0;font-size:13px;color:#334B42}.extra-label input{margin-top:2px;accent-color:var(--green)}.note{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px;margin-top:9px;resize:vertical;min-height:38px;font-size:13px}.qty-row{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:11px}.qty-control{display:flex;align-items:center;border:1px solid var(--line);border-radius:10px;overflow:hidden}.qty-control button{width:34px;height:34px;border:0;background:#F2F7F4;color:var(--green);font-weight:900}.qty{min-width:32px;text-align:center;font-weight:800}.add-btn{border:0;background:var(--green);color:#fff;padding:9px 12px;border-radius:10px;font-weight:800}
    .cart-bar{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:12px max(14px,env(safe-area-inset-left)) calc(12px + env(safe-area-inset-bottom));background:rgba(248,245,236,.94);backdrop-filter:blur(12px);border-top:1px solid rgba(11,61,46,.12)}.cart-inner{max-width:760px;margin:auto}.cart-btn{width:100%;border:0;background:var(--green);color:#fff;border-radius:16px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:800;box-shadow:var(--shadow)}.badge{background:#fff;color:var(--green);padding:5px 9px;border-radius:999px}
    .modal{position:fixed;inset:0;background:rgba(1,18,13,.55);z-index:50;display:none;align-items:flex-end;justify-content:center}.modal.show{display:flex}.sheet{background:#fff;width:100%;max-width:760px;max-height:88vh;overflow:auto;border-radius:26px 26px 0 0;padding:18px 18px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -15px 50px rgba(0,0,0,.18)}.sheet-head{display:flex;justify-content:space-between;align-items:center;gap:12px}.sheet h2{margin:0}.close{border:0;background:#EEF5F1;color:var(--green);width:38px;height:38px;border-radius:50%;font-size:22px}.cart-line{padding:13px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px}.cart-line small{display:block;color:var(--muted);margin-top:4px;line-height:1.45}.remove{border:0;background:none;color:var(--danger);padding:4px}.total{display:flex;justify-content:space-between;font-size:22px;font-weight:900;padding:18px 0}.cash{background:var(--green3);border:1px solid #C8DDD2;border-radius:14px;padding:13px;color:var(--green);font-weight:800}.submit{width:100%;border:0;background:var(--green);color:#fff;border-radius:14px;padding:15px;font-weight:900;font-size:16px;margin-top:13px}.submit:disabled,.call-btn:disabled{opacity:.55;cursor:not-allowed}
    .locked{text-align:center;padding:32px 20px}.locked .icon{font-size:58px}.locked h2{margin:12px 0 7px}.locked p{color:var(--muted);line-height:1.65}.order-total{font-size:28px;font-weight:900;color:var(--green);margin:13px 0}.spinner{width:34px;height:34px;border:4px solid #D8E7DF;border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}@keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:100;background:#12251E;color:#fff;padding:12px 16px;border-radius:12px;opacity:0;pointer-events:none;transition:.25s;max-width:90%;text-align:center;box-shadow:var(--shadow)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(min-width:620px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.hero{padding-left:max(18px,calc((100vw - 760px)/2 + 18px));padding-right:max(18px,calc((100vw - 760px)/2 + 18px))}}
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-top">
      <div><div class="brand">🍚 ร้านสบายพุง</div><div class="sub">อร่อย อิ่ม สบายพุง</div></div>
      <div class="table-pill" id="tablePill">โต๊ะ -</div>
    </div>
    <button class="call-btn" id="callStaffBtn" onclick="callStaffNow()">🔔 เรียกพนักงาน</button>
  </header>

  <main class="shell" id="app"><div class="spinner"></div></main>

  <div class="cart-bar" id="cartBar" hidden>
    <div class="cart-inner"><button class="cart-btn" onclick="openCart()"><span>ดูรายการสั่งอาหาร</span><span><span id="cartTotal">0 บาท</span> <span class="badge" id="cartCount">0</span></span></button></div>
  </div>

  <div class="modal" id="cartModal" onclick="backdropClose(event)">
    <div class="sheet">
      <div class="sheet-head"><h2>รายการของคุณ</h2><button class="close" onclick="closeCart()">×</button></div>
      <div id="cartLines"></div>
      <div class="total"><span>รวมทั้งหมด</span><span id="modalTotal">0 บาท</span></div>
      <div class="cash">💵 ชำระเงินสดเท่านั้น</div>
      <button class="submit" id="submitBtn" onclick="submitOrderNow()">ยืนยันสั่งอาหาร • ชำระเงินสด</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
  const TABLE_NO = String(new URLSearchParams(window.location.search).get('table') || '').trim();

  const APP_URL = String(
    (window.SABAI_PUNG_CONFIG && window.SABAI_PUNG_CONFIG.APP_URL) || ''
  ).trim();

  function assertAppUrl(){
    if(!APP_URL || APP_URL === 'ใส่_APP_URL_ตรงนี้'){
      throw new Error('กรุณาใส่ Google Apps Script Web App URL ในไฟล์ config.js');
    }
    if(!/^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec(?:[?#].*)?$/i.test(APP_URL)){
      throw new Error('APP_URL ไม่ถูกต้อง กรุณาใช้ Web App URL ที่ลงท้ายด้วย /exec');
    }
  }

  const gas = async (fn, ...args) => {
    assertAppUrl();

    const body = new URLSearchParams();
    body.set('api', '1');
    body.set('action', fn);
    body.set('args', JSON.stringify(args));

    let response;
    try{
      response = await fetch(APP_URL, {
        method: 'POST',
        body,
        redirect: 'follow',
        cache: 'no-store'
      });
    }catch(err){
      throw new Error('เชื่อมต่อระบบไม่ได้ กรุณาตรวจ APP_URL และการ Deploy Web App');
    }

    const text = await response.text();
    let result;
    try{
      result = JSON.parse(text);
    }catch(err){
      throw new Error('เซิร์ฟเวอร์ตอบกลับไม่ถูกต้อง กรุณาตรวจ Web App deployment');
    }

    if(!result || result.ok !== true){
      throw new Error(result && result.error ? result.error : 'ระบบทำงานผิดพลาด');
    }
    return result.data;
  };

  let data = null;
  let activeCategory = 'ทั้งหมด';
  let cart = [];
  let orderLocked = false;

  document.addEventListener('DOMContentLoaded', init);



  async function init(){
    document.getElementById('tablePill').textContent = TABLE_NO ? `โต๊ะ ${TABLE_NO}` : 'ไม่พบโต๊ะ';
    if(!TABLE_NO){ showFatal('กรุณาสแกน QR Code ที่โต๊ะเพื่อเริ่มสั่งอาหาร'); return; }

    try{
      data = await gas('getCustomerData', TABLE_NO);
      document.getElementById('tablePill').textContent = `โต๊ะ ${data.table}`;
      renderMenu();
    }catch(err){
      showFatal(err.message);
    }
  }

  function renderMenu(){
    if(orderLocked) return;
    const categories = ['ทั้งหมด', ...new Set(data.menu.map(x => x.category || 'ทั่วไป'))];
    const items = activeCategory === 'ทั้งหมด' ? data.menu : data.menu.filter(x => x.category === activeCategory);
    const app = document.getElementById('app');
    if(!data.menu.length){ app.innerHTML = `<div class="empty"><b>ยังไม่มีเมนูที่พร้อมขาย</b><p>กรุณาเรียกพนักงาน</p></div>`; return; }
    app.innerHTML = `
      <div class="notice">📱 สั่งสำเร็จแล้ว หน้านี้จะปิดการสั่งเพิ่ม กรุณา <b>สแกน QR ที่โต๊ะใหม่ทุกครั้ง</b> เมื่อต้องการสั่งรอบถัดไป</div>
      <div class="category-bar">${categories.map(c => `<button class="chip ${c===activeCategory?'active':''}" onclick="setCategory('${escapeAttr(c)}')">${escapeHtml(c)}</button>`).join('')}</div>
      <div class="grid">${items.map(renderMenuCard).join('')}</div>`;
  }

  function renderMenuCard(item){
    const image = item.image ? `<img class="menu-image" src="${escapeAttr(item.image)}" alt="${escapeAttr(item.name)}" onerror="this.outerHTML='<div class=&quot;image-placeholder&quot;>🍽️</div>'">` : `<div class="image-placeholder">🍽️</div>`;
    const extras = item.extras.length ? `<div class="extras">${item.extras.map((ex,i)=>`<label class="extra-label"><input type="checkbox" data-extra="${escapeAttr(ex.name)}" id="ex-${item.row}-${i}"><span>${escapeHtml(ex.name)} ${ex.price?`+${money(ex.price)} บาท`:''}</span></label>`).join('')}</div>` : '';
    return `<article class="menu-card" id="menu-${item.row}">${image}<div class="menu-body"><div class="menu-name">${escapeHtml(item.name)}</div><div class="menu-price">${money(item.price)} บาท</div>${extras}<textarea class="note" data-note placeholder="หมายเหตุ เช่น ไม่ใส่ผัก"></textarea><div class="qty-row"><div class="qty-control"><button onclick="changeQty(${item.row},-1)">−</button><span class="qty" data-qty>1</span><button onclick="changeQty(${item.row},1)">+</button></div><button class="add-btn" onclick="addToCart(${item.row})">+ เพิ่ม</button></div></div></article>`;
  }

  function setCategory(category){ activeCategory = category; renderMenu(); }
  function changeQty(row,delta){ const card=document.getElementById(`menu-${row}`); const el=card.querySelector('[data-qty]'); el.textContent=Math.max(1,Math.min(99,Number(el.textContent)+delta)); }

  function addToCart(row){
    const item = data.menu.find(x => x.row === row); const card = document.getElementById(`menu-${row}`);
    const qty = Number(card.querySelector('[data-qty]').textContent) || 1;
    const extras = [...card.querySelectorAll('[data-extra]:checked')].map(el => el.dataset.extra);
    const note = card.querySelector('[data-note]').value.trim();
    cart.push({ id: Date.now()+Math.random(), menuRow: row, name: item.name, basePrice:item.price, qty, extras, note, extrasData:item.extras });
    card.querySelector('[data-qty]').textContent='1'; card.querySelectorAll('[data-extra]').forEach(el=>el.checked=false); card.querySelector('[data-note]').value='';
    updateCartBar(); showToast(`เพิ่ม ${item.name} แล้ว`);
  }

  function itemTotal(line){ const extrasTotal=line.extras.reduce((s,name)=>{const ex=line.extrasData.find(x=>x.name===name);return s+(ex?Number(ex.price):0)},0); return (line.basePrice+extrasTotal)*line.qty; }
  function cartGrandTotal(){ return cart.reduce((s,x)=>s+itemTotal(x),0); }
  function cartQty(){ return cart.reduce((s,x)=>s+x.qty,0); }
  function updateCartBar(){ document.getElementById('cartBar').hidden=!cart.length||orderLocked; document.getElementById('cartTotal').textContent=`${money(cartGrandTotal())} บาท`; document.getElementById('cartCount').textContent=cartQty(); }

  function openCart(){ renderCart(); document.getElementById('cartModal').classList.add('show'); }
  function closeCart(){ document.getElementById('cartModal').classList.remove('show'); }
  function backdropClose(e){ if(e.target.id==='cartModal') closeCart(); }
  function renderCart(){
    const root=document.getElementById('cartLines');
    root.innerHTML=cart.length?cart.map(line=>`<div class="cart-line"><div><b>${escapeHtml(line.name)} × ${line.qty}</b>${line.extras.length?`<small>เพิ่มเติม: ${line.extras.map(escapeHtml).join(', ')}</small>`:''}${line.note?`<small>หมายเหตุ: ${escapeHtml(line.note)}</small>`:''}</div><div style="text-align:right"><b>${money(itemTotal(line))} บาท</b><br><button class="remove" onclick="removeCart('${line.id}')">ลบ</button></div></div>`).join(''):`<p>ยังไม่มีรายการ</p>`;
    document.getElementById('modalTotal').textContent=`${money(cartGrandTotal())} บาท`;
    document.getElementById('submitBtn').disabled=!cart.length;
  }
  function removeCart(id){ cart=cart.filter(x=>String(x.id)!==String(id)); renderCart(); updateCartBar(); }

  async function submitOrderNow(){
    if(!cart.length||orderLocked) return;
    const btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='กำลังส่งออเดอร์...';
    try{
      const result=await gas('submitOrder',{
        table:TABLE_NO,
        items:cart.map(x=>({
          menuRow:x.menuRow,
          qty:x.qty,
          extras:x.extras,
          note:x.note
        }))
      });
      orderLocked=true; cart=[]; closeCart(); updateCartBar();
      document.getElementById('app').innerHTML=`<div class="locked"><div class="icon">✅</div><h2>สั่งอาหารสำเร็จ</h2><div>เลขออเดอร์</div><b>${escapeHtml(result.orderId)}</b><div class="order-total">${money(result.total)} บาท</div><div class="cash">💵 ชำระเงินสดเท่านั้น</div><p>ร้านได้รับรายการแล้ว<br><b>หากต้องการสั่งเพิ่ม กรุณาสแกน QR ที่โต๊ะใหม่อีกครั้ง</b></p></div>`;
      showToast('รับออเดอร์เรียบร้อยแล้ว');
    }catch(err){ showToast(err.message); btn.disabled=false; btn.textContent='ยืนยันสั่งอาหาร • ชำระเงินสด'; }
  }

  async function callStaffNow(){
    if(!TABLE_NO){ showToast('กรุณาสแกน QR ที่โต๊ะ'); return; }
    const btn=document.getElementById('callStaffBtn'); btn.disabled=true; btn.textContent='กำลังเรียกพนักงาน...';
    try{
      const result=await gas('callStaff',TABLE_NO);
      showToast(result.message);
      btn.textContent='✅ เรียกพนักงานแล้ว';
      setTimeout(()=>{
        btn.disabled=false;
        btn.textContent='🔔 เรียกพนักงาน';
      },60000);
    }
    catch(err){ showToast(err.message); btn.disabled=false; btn.textContent='🔔 เรียกพนักงาน'; }
  }

  function showFatal(message){ document.getElementById('app').innerHTML=`<div class="status-card"><h2>เปิดหน้าสั่งอาหารไม่ได้</h2><p>${escapeHtml(message)}</p></div>`; }
  function showToast(message){ const el=document.getElementById('toast'); el.textContent=message; el.classList.add('show'); clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>el.classList.remove('show'),3000); }
  function money(n){ return Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:2}); }
  function escapeHtml(value){ return String(value??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
  function escapeAttr(value){ return escapeHtml(value); }
</script>
</body>
</html>
